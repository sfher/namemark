name: build

on:
  push:
    branches: [main, linux-compat]
  pull_request:
    branches: [main]

jobs:
  msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: .\build.bat
      - name: Verify binary
        run: |
          if (Test-Path namemark.exe) {
            $size = (Get-Item namemark.exe).Length
            Write-Host "Build SUCCESS: namemark.exe ($size bytes)"
          } else {
            Write-Error "namemark.exe not found"
          }

  gcc:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: make -j$(nproc)
      - name: Verify binary
        run: test -x namemark && echo "Build SUCCESS"
